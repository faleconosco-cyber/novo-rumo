<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Novo Rumo</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <div style="text-align:center; padding:12px 0 4px;">
    <img src="img/Rumo_Logo_Horizontal.png" alt="Instituto Rumo" style="height:36px; filter:brightness(0) saturate(100%) invert(27%) sepia(20%) saturate(600%) hue-rotate(96deg) brightness(80%);">
  </div>
  <div class="progresso-global">
    <div class="container" style="padding-bottom:0;">
      <div class="progresso-trilho"><div class="progresso-preenchido" id="barra"></div></div>
      <div class="progresso-rotulo" id="rotulo-progresso"></div>
    </div>
  </div>
  <div class="container">
    <div id="cabecalho-etapa"></div>
    <div id="area-modulo"></div>
    <div class="nav-rodape" style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
      <button class="btn btn-secundario" id="voltar">Voltar</button>
      <button class="btn" id="continuar" disabled>Continuar</button>
    </div>
  </div>
  <script src="js/conteudo.js"></script>
  <script src="js/armazenamento.js"></script>
  <script src="js/componentes.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
